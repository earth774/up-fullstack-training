version: "3.9"

services:

  db:
    image: postgres:16
    container_name: up_training_db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: up_training

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: up_training_web

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "3000:3000"

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/up_training
      AUTH_SECRET: changeme-super-secret

    restart: always

volumes:
  postgres_data: